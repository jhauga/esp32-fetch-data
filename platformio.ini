; PlatformIO project configuration for esp32-fetch-data.
;
; Build firmware:        pio run
; Upload firmware:       pio run -t upload
; Upload config.json:    pio run -t uploadfs   (sends the data/ folder to LittleFS)
; Serial monitor:        pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; config.json is stored on a LittleFS partition and uploaded with uploadfs.
board_build.filesystem = littlefs

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
