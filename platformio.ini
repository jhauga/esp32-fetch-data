; PlatformIO project configuration for esp32-fetch-data.
;
; Build firmware:        pio run
; Upload firmware:       pio run -t upload
; Upload config.json:    pio run -t uploadfs   (writes data/config.json to LittleFS)
; Serial monitor:        pio device monitor

[env:esp32dev]
platform = espressif32
board    = esp32dev
framework     = arduino
monitor_speed = 115200

; config.json lives in the standard PlatformIO data/ folder and is written to a
; LittleFS partition with `pio run -t uploadfs`.
board_build.filesystem = littlefs

; Plug and play: scripts/configure_display.py reads data/config.json before the
; build and, from `display.type`, selects the driver build flag, adds the right
; display library to lib_deps, and injects the display defaults so the firmware
; (and the Wokwi simulator, which does not load config.json) drives the
; configured display. Just edit data/config.json and rebuild.
extra_scripts = pre:scripts/configure_display.py

; Always-present dependencies. The script appends the display-specific library
; for the configured display.type on top of these.
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4

; display.type values handled by the script (see scripts/configure_display.py):
;   lcd_i2c (built in), lcd, oled_ssd1306, oled_sh1107, tft_ili9341,
;   tft_ili9341_touch, matrix_max7219
