; PlatformIO project configuration for esp32-fetch-data.
;
; Build firmware:        pio run
; Upload firmware:       pio run -t upload
; Upload config.json:    pio run -t uploadfs   (stages root config.json to LittleFS)
; Serial monitor:        pio device monitor

[env:esp32dev]
platform = espressif32
board    = esp32dev
framework     = arduino
monitor_speed = 115200

; config.json is stored on a LittleFS partition and uploaded with uploadfs.
board_build.filesystem = littlefs

; Stage the root-level config.json into the filesystem image (see extra_script.py),
; so it can live at the repo root rather than a data/ folder.
extra_scripts = pre:extra_script.py

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
