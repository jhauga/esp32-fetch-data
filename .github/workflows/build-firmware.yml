# Build firmware.bin on demand and publish it as GitHub Release assets so the
# device's proxy/periodic OTA mode can pull it from a stable download URL without
# the build artifacts ever being tracked in the repo.
#
# Status: work in progress. The push (window) OTA path is the supported one; this
# pull pipeline is still being finalized.
#
# Switch-gated build: a run only builds when firmware/on exists and contains "1".
# When it does, the run builds firmware.bin, uploads {firmware.bin,manifest.json,
# checksums.txt} as assets on the rolling "firmware-latest" release, deletes
# firmware/on (one-shot), and commits only that switch removal back. The built
# artifacts are never committed. Otherwise the run does nothing. To trigger a build:
#
#   echo 1 > firmware/on
#   git add firmware/on && git commit -m "build firmware" && git push
#
# The device pulls from the release download URLs (no files in the repo tree):
#   ota.proxyUrl = https://github.com/<owner>/<repo>/releases/download/firmware-latest/manifest.json
#
# Assets are uploaded as individual downloadable files (not a zipped Actions
# artifact), and the rolling tag exists from the first publish, so the download
# URL is stable. firmware.bin carries no WiFi credentials (those are provisioned
# to NVS on the first USB flash), so publishing it is safe.
name: Build Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # required to publish the release and to commit the switch removal

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Gate: build only when the firmware/on switch is present and set to "1".
      - name: Check build switch
        id: gate
        run: |
          if [ -d firmware ] && [ -f firmware/on ] && \
             [ "$(tr -d '[:space:]' < firmware/on)" = "1" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Build switch is on; building firmware."
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Build switch off (firmware/on absent or not 1); nothing to do."
          fi

      - name: Set up Python
        if: steps.gate.outputs.build == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        if: steps.gate.outputs.build == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO Core
        if: steps.gate.outputs.build == 'true'
        run: pip install --upgrade platformio

      # Force the OTA build flag so published images are over-the-air capable,
      # regardless of the committed uploadMethod.
      - name: Build firmware
        if: steps.gate.outputs.build == 'true'
        env:
          PLATFORMIO_BUILD_FLAGS: -DARDUINO_OTA
        run: pio run -e esp32dev

      # Publish the build to the rolling "firmware-latest" release. dist/ is a
      # scratch directory on the runner; nothing here is committed to the repo.
      - name: Publish firmware release
        if: steps.gate.outputs.build == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="firmware-latest"
          mkdir -p dist
          cp .pio/build/esp32dev/firmware.bin dist/firmware.bin
          stamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          printf '{\n  "version": "%s",\n  "url": "%s/firmware.bin"\n}\n' "$stamp" "$base" > dist/manifest.json
          ( cd dist && sha256sum firmware.bin > checksums.txt )
          echo "Publishing firmware (version $stamp) to release $tag:"
          cat dist/manifest.json
          # Create the rolling release on first run, then clobber its assets on
          # every later build so the download URL stays the same.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/firmware.bin dist/manifest.json dist/checksums.txt --clobber
            gh release edit "$tag" --title "Firmware $stamp" \
              --notes "Automated OTA build published $stamp. These assets are not tracked in the repo."
          else
            gh release create "$tag" dist/firmware.bin dist/manifest.json dist/checksums.txt \
              --title "Firmware $stamp" \
              --notes "Automated OTA build published $stamp. These assets are not tracked in the repo." \
              --latest
          fi

      - name: Flip the build switch off
        if: steps.gate.outputs.build == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage only the switch removal; the built artifacts are never committed.
          git rm -f firmware/on
          # [skip ci] plus the removed switch both prevent a rebuild loop.
          git commit -m "ci: build firmware [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
