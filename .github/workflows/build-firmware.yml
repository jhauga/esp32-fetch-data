# Build firmware.bin on demand and commit it into firmware/ so the device's
# proxy/periodic OTA mode can pull it from a stable raw URL.
#
# Status: work in progress. The push (window) OTA path is the supported one; this
# pull pipeline is still being finalized.
#
# Switch-gated build: a run only builds when firmware/on exists and contains "1".
# When it does, the run builds firmware.bin, writes firmware/{firmware.bin,
# manifest.json,checksums.txt}, deletes firmware/on (one-shot), and commits the
# result back. Otherwise it does nothing. To trigger a build:
#
#   echo 1 > firmware/on
#   git add firmware/on && git commit -m "build firmware" && git push
#
# The device pulls from the committed raw URLs (no GitHub Release needed):
#   ota.proxyUrl = https://raw.githubusercontent.com/<owner>/<repo>/<branch>/firmware/manifest.json
#
# firmware.bin carries no WiFi credentials (those are provisioned to NVS on the
# first USB flash), so publishing it in the repo is safe.
name: Build Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # required to commit firmware.bin back to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Gate: build only when the firmware/on switch is present and set to "1".
      - name: Check build switch
        id: gate
        run: |
          if [ -d firmware ] && [ -f firmware/on ] && \
             [ "$(tr -d '[:space:]' < firmware/on)" = "1" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Build switch is on; building firmware."
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Build switch off (firmware/on absent or not 1); nothing to do."
          fi

      - name: Set up Python
        if: steps.gate.outputs.build == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        if: steps.gate.outputs.build == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO Core
        if: steps.gate.outputs.build == 'true'
        run: pip install --upgrade platformio

      # Force the OTA build flag so published images are over-the-air capable,
      # regardless of the committed uploadMethod.
      - name: Build firmware
        if: steps.gate.outputs.build == 'true'
        env:
          PLATFORMIO_BUILD_FLAGS: -DARDUINO_OTA
        run: pio run -e esp32dev

      - name: Stage firmware/ and flip the switch off
        if: steps.gate.outputs.build == 'true'
        run: |
          cp .pio/build/esp32dev/firmware.bin firmware/firmware.bin
          stamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          raw="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/firmware"
          printf '{\n  "version": "%s",\n  "url": "%s/firmware.bin"\n}\n' "$stamp" "$raw" > firmware/manifest.json
          ( cd firmware && sha256sum firmware.bin > checksums.txt )
          rm -f firmware/on
          echo "Published firmware (version $stamp):"
          cat firmware/manifest.json

      - name: Commit firmware
        if: steps.gate.outputs.build == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A firmware/
          # [skip ci] plus the removed switch both prevent a rebuild loop.
          git commit -m "ci: publish firmware.bin [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
